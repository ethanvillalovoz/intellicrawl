name: Feature request
description: Propose a focused research, provider, export, or developer-experience improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What research workflow or limitation should this change address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful behavior and its expected output.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Primary scope
      options:
        - Pipeline or evidence model
        - Search provider
        - Analysis provider
        - CLI or export
        - Tests or developer tooling
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note workarounds or simpler approaches you considered.
  - type: checkboxes
    id: evidence
    attributes:
      label: Project principles
      options:
        - label: The proposal can preserve source attribution and explicit unknowns.
          required: true
        - label: The proposal can be tested without spending API credits in CI.
          required: true
